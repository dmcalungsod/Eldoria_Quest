version: 2.1

# ── Parameters (for scheduled pipelines) ───────────────
parameters:
  run-schedule:
    type: boolean
    default: false

# ── Reusable Commands ──────────────────────────────────
commands:
  install-ruff:
    description: Install Ruff linter
    steps:
      - run:
          name: Install Ruff
          command: pip install ruff

  install-deps:
    description: Install project dependencies with caching
    steps:
      - restore_cache:
          keys:
            - deps-v1-{{ checksum "requirements.txt" }}
            - deps-v1-
      - run:
          name: Install Dependencies
          command: pip install -r requirements.txt
      - save_cache:
          key: deps-v1-{{ checksum "requirements.txt" }}
          paths:
            - ~/.local

  install-gh:
    description: Install GitHub CLI
    steps:
      - run:
          name: Install GitHub CLI
          command: |
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update && sudo apt-get install gh -y

# ── Jobs ───────────────────────────────────────────────
jobs:
  ruff-fix:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - install-ruff
      - run:
          name: Ruff Auto-Fix & Format
          command: |
            ruff check . --fix
            ruff format .
      - run:
          name: Ruff Strict Check
          command: |
            ruff check .
            ruff format --check .

  test:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - install-deps
      - run:
          name: Install Test Dependencies
          command: pip install pytest
      - run:
          name: Run Tests
          command: python -m pytest --tb=short -q

  auto-merge:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - install-gh
      - run:
          name: Enable Auto-Merge on Open PRs
          command: |
            export GH_TOKEN="$GITHUB_TOKEN"

            echo "🤖 Auto-Merge Report"

            gh pr list --repo "dmcalungsod/Eldoria_Quest" --state open --json number,title,isDraft --jq '.[]' | while read -r pr_json; do
              pr_number=$(echo "$pr_json" | jq -r '.number')
              is_draft=$(echo "$pr_json" | jq -r '.isDraft')
              title=$(echo "$pr_json" | jq -r '.title')

              if [ "$is_draft" == "true" ]; then
                echo "⏭️  PR #$pr_number ($title) is a draft, skipping."
                continue
              fi

              echo "🔍 Enabling auto-merge for PR #$pr_number ($title)..."
              if gh pr merge "$pr_number" --repo "dmcalungsod/Eldoria_Quest" --squash --auto 2>&1; then
                echo "✅ Auto-merge enabled for PR #$pr_number"
              else
                echo "⚠️  Could not enable auto-merge for PR #$pr_number (may already be enabled)"
              fi
            done

  cleanup-branches:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - install-gh
      - run:
          name: Prune Merged Branches
          command: |
            export GH_TOKEN="$GITHUB_TOKEN"
            python scripts/prune_merged_branches.py

  mirror:
    docker:
      - image: cimg/base:current
    steps:
      - run:
          name: Clone & Push Mirror
          command: |
            git clone --mirror "https://x-access-token:${GITHUB_TOKEN}@github.com/dmcalungsod/Eldoria_Quest" repo-mirror
            cd repo-mirror
            # Remove PR refs — GitHub rejects pushes to hidden refs
            git for-each-ref --format='delete %(refname)' refs/pull | git update-ref --stdin
            if git push --mirror "https://x-access-token:${MIRROR_TOKEN}@github.com/DeeEmSea/Eldoria-Quest-Bot"; then
              echo "✅ Mirror pushed to DeeEmSea/Eldoria-Quest-Bot"
            else
              echo "❌ Mirror push failed"
              exit 1
            fi

  manage-prs:
    docker:
      - image: cimg/base:current
    steps:
      - run:
          name: Install GitHub CLI
          command: |
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update && sudo apt-get install gh -y
      - run:
          name: Update Branches, Trigger CI, Enable Auto-Merge
          command: |
            export GH_TOKEN="$GITHUB_TOKEN"
            REPO="dmcalungsod/Eldoria_Quest"

            echo "🤖 Managing open PRs..."

            gh pr list --repo "$REPO" --state open --json number,headRefName,isDraft --jq '.[] | select(.isDraft == false)' | while read -r pr_json; do
              pr_number=$(echo "$pr_json" | jq -r '.number')
              branch=$(echo "$pr_json" | jq -r '.headRefName')

              echo ""
              echo "═══ PR #$pr_number ($branch) ═══"

              # 1. Auto-update branch with main
              echo "🔄 Updating branch..."
              gh api -X PUT "repos/$REPO/pulls/$pr_number/update-branch" \
                -f update_method="merge" 2>&1 || echo "  (already up to date)"

              # 2. Trigger CircleCI if checks are pending
              checks=$(gh pr checks "$pr_number" --repo "$REPO" 2>&1 || true)
              if echo "$checks" | grep -qi "pending\|waiting"; then
                echo "🚀 Triggering CircleCI..."
                curl -s -X POST "https://circleci.com/api/v2/project/gh/$REPO/pipeline" \
                  -H "Circle-Token: $CIRCLECI_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "{\"branch\": \"$branch\"}"
                echo ""
              else
                echo "✅ All checks already reported"
              fi

              # 3. Enable auto-merge
              echo "🔀 Enabling auto-merge..."
              gh pr merge "$pr_number" --repo "$REPO" --squash --auto 2>&1 || echo "  (already enabled)"
            done

# ── Workflows ──────────────────────────────────────────
workflows:
  # CI: runs on every push/PR
  ci:
    when:
      not: << pipeline.parameters.run-schedule >>
    jobs:
      - ruff-fix
      - test:
          requires:
            - ruff-fix
      - auto-merge:
          requires:
            - ruff-fix
      - mirror:
          filters:
            branches:
              only: main
          requires:
            - ruff-fix
            - test

  # Scheduled: manage PRs + cleanup
  nightly:
    when: << pipeline.parameters.run-schedule >>
    jobs:
      - manage-prs
      - cleanup-branches