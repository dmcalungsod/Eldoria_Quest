version: 2.1

# ── Reusable Commands ──────────────────────────────────
commands:
  install-ruff:
    description: Install Ruff linter
    steps:
      - run:
          name: Install Ruff
          command: pip install ruff

  install-deps:
    description: Install project dependencies with caching
    steps:
      - restore_cache:
          keys:
            - deps-v1-{{ checksum "requirements.txt" }}
            - deps-v1-
      - run:
          name: Install Dependencies
          command: pip install -r requirements.txt
      - save_cache:
          key: deps-v1-{{ checksum "requirements.txt" }}
          paths:
            - ~/.local

# ── Jobs ───────────────────────────────────────────────
jobs:
  ruff-fix:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - install-ruff
      - run:
          name: Ruff Auto-Fix & Format
          command: |
            ruff check . --fix
            ruff format .
      - run:
          name: Commit Fixes (if any)
          command: |
            git config user.name "CircleCI"
            git config user.email "ci@circleci.com"
            if [ -n "$(git status --porcelain)" ]; then
              git add -A
              git commit -m "style: auto-fix code with Ruff [ci skip]"
              git push origin "$CIRCLE_BRANCH"
              echo "✅ Pushed auto-fix commit"
            else
              echo "✅ No fixes needed"
            fi
      - run:
          name: Ruff Strict Check
          command: |
            ruff check .
            ruff format --check .

  test:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - install-deps
      - run:
          name: Install Test Dependencies
          command: pip install pytest
      - run:
          name: Run Tests
          command: python -m pytest --tb=short -q

# ── Workflow ───────────────────────────────────────────
workflows:
  ci:
    jobs:
      - ruff-fix
      - test:
          requires:
            - ruff-fix