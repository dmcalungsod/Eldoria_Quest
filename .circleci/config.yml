version: 2.1

orbs:
  codecov: codecov/codecov@4.1.0

# ── Reusable Commands ──────────────────────────────────
commands:
  install-tools:
    description: Install static analysis tools (Ruff, Bandit, pip-audit)
    steps:
      - run:
          name: Install Tools
          command: pip install ruff bandit pip-audit

  install-deps:
    description: Install project dependencies with caching
    steps:
      - restore_cache:
          keys:
            - deps-v1-{{ checksum "requirements.txt" }}
            - deps-v1-
      - run:
          name: Install Dependencies
          command: pip install -r requirements.txt
      - save_cache:
          key: deps-v1-{{ checksum "requirements.txt" }}
          paths:
            - ~/.local

  install-gh:
    description: Install GitHub CLI
    steps:
      - run:
          name: Install GitHub CLI
          command: |
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update && sudo apt-get install gh -y

# ── Jobs ───────────────────────────────────────────────
jobs:
  static-analysis:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - install-tools
      - run:
          name: Ruff Auto-Fix & Format
          command: |
            ruff check . --fix
            ruff format .
      - run:
          name: Ruff Strict Check
          command: |
            ruff check .
            ruff format --check .
      - run:
          name: Bandit Security Scan
          command: bandit -r . -c pyproject.toml -ll
      - run:
          name: Dependency Vulnerability Scan
          command: pip-audit -r requirements.txt

  test:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - install-deps
      - run:
          name: Install Test Dependencies
          command: pip install pytest pytest-cov
      - run:
          name: Run Tests with Coverage
          command: python -m pytest --tb=short -q --cov=. --cov-report=xml:coverage.xml
      - run:
          name: Upload Coverage to Codacy
          command: |
            export CODACY_ORGANIZATION_PROVIDER=gh
            export CODACY_USERNAME=dmcalungsod
            export CODACY_PROJECT_NAME=Eldoria_Quest
            bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r coverage.xml

  test-and-upload-codecov:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - install-deps
      - run:
          name: Install Test Dependencies
          command: pip install pytest pytest-cov
      - run:
          name: Run Tests with Coverage
          command: python -m pytest --tb=short -q --cov=. --cov-report=xml:coverage.xml
      - codecov/upload

  auto-merge:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - install-gh
      - run:
          name: Enable Auto-Merge on Open PRs
          command: |
            export GH_TOKEN="$GITHUB_TOKEN"

            echo "🤖 Auto-Merge Report"

            gh pr list --repo "dmcalungsod/Eldoria_Quest" --state open --json number,title,isDraft --jq '.[]' | while read -r pr_json; do
              pr_number=$(echo "$pr_json" | jq -r '.number')
              is_draft=$(echo "$pr_json" | jq -r '.isDraft')
              title=$(echo "$pr_json" | jq -r '.title')

              if [ "$is_draft" == "true" ]; then
                echo "⏭️  PR #$pr_number ($title) is a draft, skipping."
                continue
              fi

              echo "🔍 Enabling auto-merge for PR #$pr_number ($title)..."
              if gh pr merge "$pr_number" --repo "dmcalungsod/Eldoria_Quest" --squash --auto 2>&1; then
                echo "✅ Auto-merge enabled for PR #$pr_number"
              else
                echo "⚠️  Could not enable auto-merge for PR #$pr_number (may already be enabled)"
              fi
            done


  mirror:
    docker:
      - image: cimg/base:current
    steps:
      - run:
          name: Clone & Push Mirror
          command: |
            git clone --mirror "https://x-access-token:${GITHUB_TOKEN}@github.com/dmcalungsod/Eldoria_Quest" repo-mirror
            cd repo-mirror
            # Remove PR refs — GitHub rejects pushes to hidden refs
            git for-each-ref --format='delete %(refname)' refs/pull | git update-ref --stdin
            if git push --mirror "https://x-access-token:${MIRROR_TOKEN}@github.com/DeeEmSea/Eldoria-Quest-Bot"; then
              echo "✅ Mirror pushed to DeeEmSea/Eldoria-Quest-Bot"
            else
              echo "❌ Mirror push failed"
              exit 1
            fi

# ── Workflows ──────────────────────────────────────────
workflows:
  # CI: runs on every push/PR to the main repo ONLY
  ci:
    when:
      equal: [ "https://github.com/dmcalungsod/Eldoria_Quest", << pipeline.project.git_url >> ]
    jobs:
      - static-analysis:
          filters:
            branches:
              ignore: main
      - test:
          requires:
            - static-analysis
          filters:
            branches:
              ignore: main
      - auto-merge:
          requires:
            - static-analysis
          filters:
            branches:
              ignore: main
      - mirror:
          filters:
            branches:
              only: main

  # Scheduled workflow for Codecov upload (4 times a week)
  weekly-codecov:
    triggers:
      - schedule:
          # Sun, Tue, Thu, Sat at 00:00 UTC (08:00 AM PHT)
          cron: "0 0 * * 0,2,4,6"
          filters:
            branches:
              only:
                - main
    jobs:
      - test-and-upload-codecov
