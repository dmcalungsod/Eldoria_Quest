version: 2.1

# ── Reusable Commands ──────────────────────────────────
commands:
  install-ruff:
    description: Install Ruff linter
    steps:
      - run:
          name: Install Ruff
          command: pip install ruff

  install-deps:
    description: Install project dependencies with caching
    steps:
      - restore_cache:
          keys:
            - deps-v1-{{ checksum "requirements.txt" }}
            - deps-v1-
      - run:
          name: Install Dependencies
          command: pip install -r requirements.txt
      - save_cache:
          key: deps-v1-{{ checksum "requirements.txt" }}
          paths:
            - ~/.local

# ── Jobs ───────────────────────────────────────────────
jobs:
  ruff-lint:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - install-ruff
      - run:
          name: Ruff Lint Check
          command: ruff check .

  ruff-format:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - install-ruff
      - run:
          name: Ruff Format Check
          command: ruff format --check .

  test:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - install-deps
      - run:
          name: Install Test Dependencies
          command: pip install pytest
      - run:
          name: Run Tests
          command: python -m pytest --tb=short -q

# ── Workflow ───────────────────────────────────────────
workflows:
  ci:
    jobs:
      - ruff-lint
      - ruff-format
      - test:
          requires:
            - ruff-lint
            - ruff-format