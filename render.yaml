# Render Blueprint – Eldoria Quest Discord Bot
# https://docs.render.com/blueprint-spec

services:
  - type: worker
    name: eldoria-quest-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false          # Set manually in Render dashboard
      - key: GUILD_ID
        sync: false
      - key: DATABASE_NAME
        value: EQ_Game.db
      - key: PYTHON_VERSION
        value: "3.13.9"
