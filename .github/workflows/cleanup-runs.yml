name: Cleanup Old Workflow Runs

on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly on Sunday at 3 AM UTC
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Keep the last 30 days of runs, delete everything older
          CUTOFF=$(date -d '30 days ago' --iso-8601=seconds)
          echo "Deleting workflow runs older than $CUTOFF..."

          deleted_count=0
          run_ids=$(gh api repos/${{ github.repository }}/actions/runs \
            --paginate \
            --jq ".workflow_runs[] | select(.created_at < \"$CUTOFF\") | .id")

          while IFS= read -r run_id; do
            [ -z "$run_id" ] && continue
            echo "Deleting run $run_id"
            if gh api -X DELETE repos/${{ github.repository }}/actions/runs/$run_id; then
              deleted_count=$((deleted_count + 1))
            fi
          done <<< "$run_ids"

          echo "### 🗑️ Workflow Run Cleanup" >> $GITHUB_STEP_SUMMARY
          if [ "$deleted_count" -eq 0 ]; then
            echo "✅ No runs found older than the retention threshold. Nothing to clean up." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Deleted **$deleted_count** workflow run(s) older than the retention threshold." >> $GITHUB_STEP_SUMMARY
          fi
