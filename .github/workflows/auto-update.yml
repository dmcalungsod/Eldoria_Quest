name: Auto Update Branch

on:
  push:
    branches:
      - main
  # Allow manual trigger
  workflow_dispatch:

jobs:
  autoupdate:
    if: github.repository == 'dmcalungsod/Eldoria_Quest'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Auto-update PRs that are behind
        uses: chinthakagodawita/autoupdate@0707656cd062a3b0cf8fa9b2cda1d1404d74437e # v1.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        with:
          exclude: 'dependabot/*' 
          pr_filter: 'auto_merge'
