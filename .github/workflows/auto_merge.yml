name: Auto-Merge and Cleanup

on:
  check_suite:
    types: [completed]
  schedule:
    # Run daily at midnight (UTC), which is 8 AM Philippine Standard Time (PST)
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Auto-merge PRs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Iterate through open PRs and check for specific status checks
          echo "### 🤖 Auto-Merge Report" >> $GITHUB_STEP_SUMMARY

          gh pr list --state open --json number,title,headRefName,isDraft --jq '.[]' | while read -r pr_json; do
            pr_number=$(echo "$pr_json" | jq -r '.number')
            is_draft=$(echo "$pr_json" | jq -r '.isDraft')
            title=$(echo "$pr_json" | jq -r '.title')

            if [ "$is_draft" == "true" ]; then
              echo "PR #$pr_number ($title) is a draft, skipping."
              continue
            fi

            echo "Checking PR #$pr_number ($title)..."

            # Check for GitGuardian, CodeRabbit, and CircleCI
            # All required checks must be present and none can be failed/pending.

            checks_output=$(gh pr checks "$pr_number")

            if echo "$checks_output" | grep -q "GitGuardian Security Checks" && \
               echo "$checks_output" | grep -q "CodeRabbit" && \
               echo "$checks_output" | grep -q "ci/ruff-lint" && \
               echo "$checks_output" | grep -q "ci/ruff-format" && \
               echo "$checks_output" | grep -q "ci/test" && \
               ! echo "$checks_output" | grep -q "fail" && \
               ! echo "$checks_output" | grep -q "pending"; then

               echo "All required checks passed for PR #$pr_number. Merging..."
               if gh pr merge "$pr_number" --squash; then
                 echo "- ✅ Merged PR #$pr_number ($title)" >> $GITHUB_STEP_SUMMARY
               else
                 echo "- ❌ Failed to merge PR #$pr_number" >> $GITHUB_STEP_SUMMARY
               fi
            else
               echo "PR #$pr_number waiting on checks (GitGuardian/CodeRabbit/CircleCI not ready or failed)."
               echo "- ⏳ PR #$pr_number waiting on checks" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Summary
        if: always()
        run: |
          echo "### 🤖 Auto-Merge Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Auto-merge job completed." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Auto-merge job failed." >> $GITHUB_STEP_SUMMARY
          fi

  cleanup-branches:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'check_suite'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Prune Merged Branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/prune_merged_branches.py

      - name: Summary
        if: always()
        run: |
          echo "### 🧹 Branch Pruning" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Branch pruning completed." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Branch pruning failed." >> $GITHUB_STEP_SUMMARY
          fi
