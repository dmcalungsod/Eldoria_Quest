name: Eldoria CI

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - 'logs/**'
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the code
    - name: Checkout Repository
      uses: actions/checkout@v5
      with:
        ref: ${{ github.head_ref }}

    # 2. Set up Python (Matching your replit environment)
    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
        cache: 'pip'

    # 3. Install Dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Auto-Fix Code (The "Self-Healing" Step)
    - name: Run Ruff (Fix & Format)
      run: |
        # Fix import sorting and lint errors
        ruff check . --fix
        # Format code (spacing, quotes)
        ruff format .

    # 5. Commit Changes (Only if Ruff made fixes)
    - name: Commit Ruff Fixes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "style: auto-fix code with Ruff"
        branch: ${{ github.head_ref }}
        file_pattern: '*.py'

    # 6. Run Your Custom Test Suite
    - name: Run Eldoria Test Suite
      env:
        # Mock secrets so tests don't fail on missing env vars
        DISCORD_BOT_TOKEN: "mock_token_for_testing" 
        GUILD_ID: "123456789"
      run: |
        # We use your existing test runner which handles DB creation/cleanup
        python tests/run_all_tests.py