---
name: Eldoria CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed for auto-fix commit
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Lint Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit

      - name: Run Ruff (Check)
        if: github.event_name != 'pull_request'
        run: |
          ruff check .
          ruff format --check .
          echo "### 🖌️ Linting Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Ruff checks passed" >> $GITHUB_STEP_SUMMARY

      - name: Run Ruff (Fix & Format)
        if: github.event_name == 'pull_request'
        run: |
          ruff check . --fix
          ruff format .
          echo "### 🖌️ Linting Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Ruff checks (fix mode) completed" >> $GITHUB_STEP_SUMMARY

      - name: Commit Ruff Fixes
        if: github.event_name == 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix code with Ruff"
          branch: ${{ github.head_ref }}
          file_pattern: '*.py'

      - name: Run Bandit Security Linter
        run: |
          bandit -r . -ll
          echo "✅ Bandit Security Scan passed" >> $GITHUB_STEP_SUMMARY

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:5.0
        ports:
          - 27017:27017
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Eldoria Test Suite
        env:
          DISCORD_BOT_TOKEN: "mock_token_for_testing"
          GUILD_ID: "123456789"
          MONGO_URI: "mongodb://localhost:27017"
        run: |
          set -o pipefail
          python -m pytest tests/ \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=html \
            -v | tee pytest_output.txt

      - name: Generate Test Summary
        if: always()
        run: |
          echo "### 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -f pytest_output.txt ]; then
            # Extract the summary line (e.g. === 150 passed in 2.3s ===)
            summary_line=$(grep -E "=== .* ===" pytest_output.txt | tail -n 1)
            echo "\`$summary_line\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Tests failed to run or crashed." >> $GITHUB_STEP_SUMMARY
          fi
          echo "📊 Coverage Report: Attached as artifact \`coverage-report\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14

  audit:
    name: Security & Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Audit Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit Dependencies (pip-audit)
        run: |
          echo "### 🛡️ Security Audit" >> $GITHUB_STEP_SUMMARY
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt \
              --strict --desc on
            echo "✅ Dependency audit passed. No vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          else
            echo "No requirements.txt found, skipping dependency audit."
            echo "⚠️ Skipped: No requirements.txt found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Validate Database Technology
        run: |
          if grep -r "import sqlite3" database/; then
            echo "Error: SQLite usage detected in database/ directory."
            echo "Please use MongoDB."
            echo "❌ Database Check Failed: SQLite usage detected." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ Database Check Passed: MongoDB compliance verified." >> $GITHUB_STEP_SUMMARY
