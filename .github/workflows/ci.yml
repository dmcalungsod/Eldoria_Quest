name: Eldoria CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:5.0
        ports:
          - 27017:27017

    steps:
    # 1. Check out the code
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref || github.ref }}

    # 2. Set up Python (Matching your replit environment)
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    # 3. Install Dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pytest-cov pip-audit bandit
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Dependency Security Audit
    - name: Audit Dependencies (pip-audit)
      run: |
        pip-audit -r requirements.txt --strict --desc on

    # 5. Auto-Fix Code (The "Self-Healing" Step) — PR only to prevent infinite loops
    - name: Run Ruff (Fix & Format)
      if: github.event_name == 'pull_request'
      run: |
        # Fix import sorting and lint errors
        ruff check . --fix
        # Format code (spacing, quotes)
        ruff format .

    # 6. Commit Changes (Only if Ruff made fixes — PR only)
    - name: Commit Ruff Fixes
      if: github.event_name == 'pull_request'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "style: auto-fix code with Ruff"
        branch: ${{ github.head_ref }}
        file_pattern: '*.py'

    # 7. Run Your Custom Test Suite (with Coverage)
    - name: Run Eldoria Test Suite
      env:
        # Mock secrets so tests don't fail on missing env vars
        DISCORD_BOT_TOKEN: "mock_token_for_testing"
        GUILD_ID: "123456789"
        MONGO_URI: "mongodb://localhost:27017"
      run: |
        # Run tests with coverage tracking
        python -m pytest tests/ --cov=. --cov-report=term-missing --cov-report=html -v

    # 8. Security Scan (Bandit)
    - name: Run Bandit security linter
      run: bandit -r . -ll

    # 9. Database Schema Validation (No SQLite allowed)
    - name: Validate Database Technology
      run: |
        if grep -r "import sqlite3" database/; then
          echo "Error: SQLite usage detected in database/ directory. Please use MongoDB."
          exit 1
        fi

    # 10. Upload Coverage Report
    - name: Upload Coverage Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/
        retention-days: 14
