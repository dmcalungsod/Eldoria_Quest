name: Eldoria CI

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - 'logs/**'
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:5.0
        ports:
          - 27017:27017

    steps:
    # 1. Check out the code
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref || github.ref }}

    # 2. Set up Python (Matching your replit environment)
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    # 3. Install Dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Auto-Fix Code (The "Self-Healing" Step) — PR only to prevent infinite loops
    - name: Run Ruff (Fix & Format)
      if: github.event_name == 'pull_request'
      run: |
        # Fix import sorting and lint errors
        ruff check . --fix
        # Format code (spacing, quotes)
        ruff format .

    # 5. Commit Changes (Only if Ruff made fixes — PR only)
    - name: Commit Ruff Fixes
      if: github.event_name == 'pull_request'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "style: auto-fix code with Ruff"
        branch: ${{ github.head_ref }}
        file_pattern: '*.py'

    # 6. Run Your Custom Test Suite
    - name: Run Eldoria Test Suite
      env:
        # Mock secrets so tests don't fail on missing env vars
        DISCORD_BOT_TOKEN: "mock_token_for_testing"
        GUILD_ID: "123456789"
        MONGO_URI: "mongodb://localhost:27017"
      run: |
        # We use your existing test runner which handles DB creation/cleanup
        python tests/run_all_tests.py

    # 7. Auto-merge PR (Only on PRs, only if all steps above passed)
    - name: Auto-merge PR
      if: github.event_name == 'pull_request' && success()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        PR_NUM=${{ github.event.pull_request.number }}
        echo "Enabling auto-merge for PR #$PR_NUM..."
        gh pr merge $PR_NUM --squash --auto
