name: Trigger CircleCI on PR

# Temporarily disabled automatic PR triggers due to GitHub Actions billing/spending limits.
# Use manual trigger via "Run workflow" if needed.
on:
  workflow_dispatch:
  # pull_request:
  #   types: [opened, synchronize]

jobs:
  trigger:
    runs-on: ubuntu-latest
    # if: "!contains(github.event.pull_request.title, '[skip ci]') && !contains(github.event.pull_request.body, '[skip ci]')"
    steps:
      - name: Trigger CircleCI Pipeline
        run: |
          curl -s -X POST "https://circleci.com/api/v2/project/gh/dmcalungsod/Eldoria_Quest/pipeline" \
            -H "Circle-Token: ${{ secrets.CIRCLECI_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"branch\": \"${{ github.head_ref }}\"}"
