name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 1 * * *'  # Daily at 1 AM UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: '🕰️ This issue has been inactive for 30 days. It will be closed in 7 days if there is no activity.'
          stale-pr-message: '🕰️ This PR has been inactive for 30 days. It will be closed in 7 days if there is no activity.'
          close-issue-message: '🔒 Closing due to inactivity. Feel free to reopen if this is still relevant.'
          close-pr-message: '🔒 Closing due to inactivity. Feel free to reopen if this is still relevant.'
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'

      - name: Summary
        if: always()
        run: |
          echo "### 🕰️ Stale Issues & PRs" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Stale check completed. Issues/PRs inactive for **30 days** marked stale; closed after **7 more days**." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Stale check failed." >> $GITHUB_STEP_SUMMARY
          fi
