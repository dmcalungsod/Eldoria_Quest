name: Run Agents

on:
  schedule:
    # Run daily at 00:00 UTC (Eldoria time is GMT+8, so 16:00 UTC previous day?)
    # AGENTS.md says "Active Agents (Daily) ... GameForge 12:00 AM (GMT+8)".
    # 00:00 GMT+8 is 16:00 UTC.
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  run-agents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Need history for context

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Calculate Current Date
        id: date
        run: echo "CURRENT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Run Agents
        env:
          CURRENT_DATE: ${{ env.CURRENT_DATE }}
          # Add other secrets here if needed for real implementation
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Running agents for date: $CURRENT_DATE"
          python3 scripts/run_agents.py

      - name: Commit Logs (if any)
        # In a real implementation, the script would generate logs.
        # Since this is a mock, we just commit if changes were made (e.g., by the script saving files).
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs(agents): update logs for ${{ env.CURRENT_DATE }}"
          branch: ${{ github.ref_name }}
          file_pattern: '.Jules/agent_logs/*.md'
