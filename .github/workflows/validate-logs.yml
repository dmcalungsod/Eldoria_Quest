name: Validate Logs

on:
  pull_request:
    paths:
      - '.Jules/agent_logs/**'

jobs:
  validate-logs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Run Log Validator
        run: python3 scripts/validate_logs.py
