name: PR Labeler
on:
  pull_request:
    branches: ["main", "master"]
    types: [opened, synchronize, reopened]
permissions:
  contents: read
  pull-requests: write
jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
      - name: Label PR
        uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true

      - name: Summary
        if: always()
        run: |
          echo "### 🏷️ PR Labeler" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Labels applied to PR #${{ github.event.pull_request.number }}." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Labeler failed for PR #${{ github.event.pull_request.number }}." >> $GITHUB_STEP_SUMMARY
          fi
