name: Auto-Merge and Cleanup

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  schedule:
    # Run daily at midnight (UTC), which is 8 AM Philippine Standard Time (PST)
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Auto-merge PRs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_LIST: ${{ toJSON(github.event.workflow_run.pull_requests) }}
        run: |
          # The workflow_run event provides a list of PRs that triggered the workflow
          # We iterate through them and merge

          echo "### 🤖 Auto-Merge Report" >> $GITHUB_STEP_SUMMARY

          if [ "$PR_LIST" == "null" ] || [ -z "$PR_LIST" ]; then
            echo "No PRs associated with this workflow run."
            echo "No PRs to merge." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Parse JSON to get numbers
          echo "$PR_LIST" | jq -r '.[] | .number' | while read pr_number; do
            if [ "$pr_number" != "null" ] && [ -n "$pr_number" ]; then
              echo "Merging PR #$pr_number..."
              if gh pr merge "$pr_number" --squash; then
                echo "- ✅ Merged PR #$pr_number" >> $GITHUB_STEP_SUMMARY
              else
                echo "Failed to merge PR #$pr_number"
                echo "- ❌ Failed to merge PR #$pr_number" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done

  cleanup-branches:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Prune Merged Branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/prune_merged_branches.py
