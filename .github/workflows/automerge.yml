name: Auto-merge eligible PRs

on:
  # Trigger on PR events that might make a PR mergeable
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - ready_for_review
  # Trigger when a check suite completes (e.g., CI tests pass)
  check_suite:
    types: [completed]
  # Trigger when a commit status changes (for status-based checks)
  status: {}

jobs:
  automerge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Auto-merge
        uses: pascalgn/automerge-action@v0.16.4
        env:
          # Token to perform merge and update actions
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

          # Only merge PRs with this label
          MERGE_LABELS: "automerge"

          # Use squash merge to keep history clean
          MERGE_METHOD: "squash"

          # Do not merge PRs from forks for security
          MERGE_FORKS: "false"

          # Retry up to 6 times to handle race conditions
          MERGE_RETRIES: "6"

          # Wait 10 seconds between retries
          MERGE_RETRY_SLEEP: "10000"

          # Update branch if it has the automerge label
          UPDATE_LABELS: "automerge"

          # Use merge to update the branch (avoids force push issues)
          UPDATE_METHOD: "merge"
